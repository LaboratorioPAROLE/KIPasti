name: Update Changelog

# Runs automatically when a GitHub Release is published.
# Prepends the release notes to docs/modules/ROOT/pages/changelog.adoc,
# commits to main, and pushes. Antora picks up the new content on
# the next build (the tag version in the dropdown will show the updated page).

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepend release notes to changelog.adoc
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const tag  = context.payload.release.tag_name;
            const date = context.payload.release.published_at.slice(0, 10);
            let body   = context.payload.release.body || '_No release notes provided._';

            // Basic markdown → AsciiDoc conversion
            body = body.replace(/^## (.+)$/gm, '=== $1');
            body = body.replace(/\*\*Full Changelog\*\*: (https:\/\/\S+)/g, 'link:$1[Full Changelog]');
            body = body.replace(/\*\*(.+?)\*\*/g, '*$1*');

            const newSection = `== ${tag} (${date})\n\n${body.trim()}\n\n`;

            const path = 'docs/modules/ROOT/pages/changelog.adoc';
            let content = fs.readFileSync(path, 'utf8');

            // Insert after the page title (first line + following blank line)
            content = content.replace(/^(= Changelog\n\n)/, `$1${newSection}`);
            fs.writeFileSync(path, content);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/modules/ROOT/pages/changelog.adoc
          if ! git diff --cached --quiet; then
            git commit -m "docs: add changelog entry for ${{ github.event.release.tag_name }}"
            git push origin main
          fi
