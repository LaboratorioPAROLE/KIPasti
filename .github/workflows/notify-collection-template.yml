# Copy this file into .github/workflows/ of each module repo (KIP, KIPasti, ParlaBO, ParlaTO).
# Rename it to notify-collection.yml in the module repo.
#
# Required secret in each module repo:
#   COLLECTION_TOKEN — a GitHub PAT with `repo` scope on KIParla/KIParla-collection
#   (Settings → Secrets and variables → Actions → New repository secret)

name: Notify Collection on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build to KIParla-collection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COLLECTION_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'KIParla',
              repo: 'KIParla-collection',
              event_type: 'module-released',
              client_payload: {
                module: context.repo.repo,
                tag: context.ref.replace('refs/tags/', ''),
                release_url: context.payload.release.html_url,
              },
            });
