name: Release Module

# Run this workflow manually after merging the version-bump PR to main.
# It reads the version from CITATION.cff, creates the tag, and opens a
# DRAFT release pre-filled with auto-generated notes (commits since last tag).
# Review and edit the draft on GitHub, then publish it manually.
# Publishing triggers notify-collection, which rebuilds KIParla-collection.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version from CITATION.cff
        id: version
        run: |
          VERSION=$(grep '^version:' CITATION.cff | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update docs/antora.yml version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^version:.*/version: '${{ steps.version.outputs.version }}'/" docs/antora.yml
          git add docs/antora.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update docs version to ${{ steps.version.outputs.version }}"
            git push origin main
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "Tag v${{ steps.version.outputs.version }} already exists. Aborting."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create draft release with auto-generated notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.version }}`,
              name: `v${{ steps.version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            core.summary.addRaw(`Draft release created: ${release.html_url}\nReview the notes, edit if needed, then publish to trigger the collection rebuild.`);
            await core.summary.write();
